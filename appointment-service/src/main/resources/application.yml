spring:
  application:
    name: appointment-service

  # Datasource
  datasource:
      url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://appointment-service-db:5432/db}
      username: ${SPRING_DATASOURCE_USERNAME:admin_user}
      password: ${SPRING_DATASOURCE_PASSWORD:admin}

  # Hibernate
  jpa:
    hibernate:
      ddl-auto: update

  # SQL Init Mode
  sql:
    init:
      mode: always

  kafka:
    consumer:
      key-deserializer: ${SPRING_KAFKA_CONSUMER_KEY_DESERIALIZER:org.apache.kafka.common.serialization.StringDeserializer}
      value-deserializer: ${SPRING_KAFKA_CONSUMER_VALUE_DESERIALIZER:org.apache.kafka.common.serialization.ByteArrayDeserializer}
      group-id: appointment-service


server:
  port: 4006





